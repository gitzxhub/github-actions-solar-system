name: Solar System Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'

permissions:
  contents: read
  packages: write

env:
  MONGO_URI: mongodb+srv://supercluster.d83jj.mongodb.net/superData
  MONGO_USERNAME: superuser
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
  unit-testing:
    name: Unit Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

      - name: Archive Test Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mocha-Test-Result
          path: test-results.xml

  code-coverage:
    runs-on: ubuntu-latest
    needs: unit-testing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Run Coverage
        continue-on-error: true
        run: npm run coverage

      - uses: actions/upload-artifact@v4
        with:
          name: Code-Coverage-Result
          path: coverage
          retention-days: 5

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - unit-testing
      - code-coverage

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: lower
        run: |
          echo "repo=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.lower.outputs.repo }}/solar-system:${{ github.sha }}

  dev-deploy:
    name: Deploy to Dev (Kind Cluster)
    runs-on: ubuntu-latest
    needs: docker

    environment:
      name: development

    steps:
      - name: Install Kubernetes Kind Cluster
        uses: helm/kind-action@v1

      - name: Deploy Application
        run: |
          sleep 60
          kubectl -n kube-system get pods

          REPO_OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')

          kubectl run solar \
          --image ghcr.io/$REPO_OWNER_LC/solar-system:${{ github.sha }} \
          --env="MONGO_URI=${{ env.MONGO_URI }}" \
          --env="MONGO_USERNAME=${{ env.MONGO_USERNAME }}" \
          --env="MONGO_PASSWORD=${{ env.MONGO_PASSWORD }}"

          kubectl get pods
          sleep 10